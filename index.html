<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practical Nurse Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- ตั้งค่าเริ่มต้น & คุมโทนสีการแพทย์ --- */
        :root {
            --primary-color: #0d6efd; /* สีฟ้าการแพทย์ */
            --dark-medical: #1e293b;  /* สีกรมท่าเข้ม ดูน่าเชื่อถือ */
            --bg-light: #f8fafc;      /* สีพื้นหลังขาวสะอาด */
            --text-main: #334155;     /* สีตัวอักษร */
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            padding-top: 80px; /* เว้นพื้นที่ให้ Navbar ด้านบน */
        }

        /* --- แถบด้านบน (Navbar) --- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background-color: #ffffff;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10%;
            z-index: 1000;
            border-bottom: 3px solid var(--primary-color);
        }

        .nav-logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--dark-medical);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo i {
            color: var(--primary-color);
            animation: pulse 2s infinite; /* ลูกเล่นหัวใจเต้นที่ไอคอน */
        }

        /* --- ปุ่มติดต่อด้านบน (Contact Action) --- */
        .nav-contact {
            display: flex;
            gap: 15px;
        }

        .contact-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .btn-phone {
            background-color: #e0f2fe;
            color: #0369a1;
        }

        .btn-phone:hover {
            background-color: #0369a1;
            color: #ffffff;
            transform: translateY(-2px);
        }

        .btn-email {
            background-color: #dcfce7;
            color: #15803d;
        }

        .btn-email:hover {
            background-color: #15803d;
            color: #ffffff;
            transform: translateY(-2px);
        }

        /* --- ส่วนเนื้อหาหลัก (Main Content) --- */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* การ์ดข้อมูลหลัก */
        .profile-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            text-align: center;
            border: 1px solid #e2e8f0;
            position: relative;
            overflow: hidden;
        }

        /* ลูกเล่นเส้นแถบสีตกแต่งด้านบนของการ์ด */
        .profile-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, var(--primary-color), #38bdf8);
        }

        .avatar-wrapper {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
        }

        .avatar-placeholder {
            width: 100%;
            height: 100%;
            background-color: #f1f5f9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--primary-color);
            border: 4px solid #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .status-badge {
            background-color: #34d399;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 15px;
            font-weight: 500;
        }

        h1 {
            color: var(--dark-medical);
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--primary-color);
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }

        .divider {
            height: 1px;
            background: #e2e8f0;
            margin: 25px 0;
        }

        /* ส่วนข้อมูลรายละเอียด */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1xl));
            gap: 20px;
            text-align: left;
            margin-top: 20px;
        }

        .info-item {
            background-color: #f8fafc;
            padding: 15px 20px;
            border-radius: 12px;
            border-left: 4px solid var(--primary-color);
            transition: var(--transition);
        }

        .info-item:hover {
            transform: translateX(5px);
            background-color: #f1f5f9;
        }

        .info-label {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 3px;
        }

        .info-value {
            font-size: 1.05rem;
            color: var(--dark-medical);
            font-weight: 500;
        }

        /* --- Animation --- */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* รองรับการแสดงผลบนมือถือ */
        @media (max-width: 600px) {
            .navbar {
                padding: 0 5%;
                height: auto;
                padding-top: 15px;
                padding-bottom: 15px;
                flex-direction: column;
                gap: 10px;
            }
            body {
                padding-top: 120px;
            }
            .nav-contact {
                width: 100%;
                justify-content: center;
            }
            .profile-card {
                padding: 25px 15px;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">
            <i class="fa-solid fa-user-nurse"></i> Practical Nurse
        </div>
        <div class="nav-contact">
            <a href="tel:0123456789" class="contact-btn btn-phone">
                <i class="fa-solid fa-phone"></i> โทรติดต่อ
            </a>
            <a href="mailto:yourmail@email.com?subject=ติดต่อจากหน้าเว็บพยาบาล" class="contact-btn btn-email">
                <i class="fa-solid fa-envelope"></i> ส่งอีเมล
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="profile-card">
            
            <div class="avatar-wrapper">
                <div class="avatar-placeholder">
                    <i class="fa-solid fa-heart-pulse"></i>
                </div>
            </div>

            <span class="status-badge"><i class="fa-solid fa-circle-check"></i> พร้อมปฏิบัติงาน</span>
            
            <h1>ชื่อ - นามสกุลของคุณ</h1>
            <p class="subtitle">พยาบาลเทคนิค (Practical Nurse)</p>
            
            <div class="divider"></div>

            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label"><i class="fa-solid fa-address-card"></i> ข้อมูลการติดต่อหลัก</div>
                    <div class="info-value">เบอร์โทร: 012-3456789</div>
                </div>
                <div class="info-item">
                    <div class="info-label"><i class="fa-solid fa-envelope-open-text"></i> อีเมล</div>
                    <div class="info-value">yourmail@email.com</div>
                </div>
                <div class="info-item">
                    <div class="info-label"><i class="fa-solid fa-graduation-cap"></i> ตำแหน่ง/วิชาชีพ</div>
                    <div class="info-value">Practical Nurse (PN)</div>
                </div>
                <div class="info-item">
                    <div class="info-label"><i class="fa-solid fa-hospital-user"></i> วัตถุประสงค์</div>
                    <div class="info-value">พร้อมให้บริการดูแลและพยาบาลอย่างมืออาชีพ</div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
